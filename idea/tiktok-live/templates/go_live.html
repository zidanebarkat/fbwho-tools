<!DOCTYPE html>
<html>
<head>
  <meta name=viewport content="width=device-width,initial-scale=1">
  <title>Go Live - TikTok Live Panel</title>
  <style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#0a0a0a,#1a0a2e);color:#e0e0e0;font-family:system-ui;min-height:100vh}
.header{background:rgba(17,17,17,.95);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #222;backdrop-filter:blur(10px);position:sticky;top:0;z-index:100}
.header h1{font-size:1.15rem;background:linear-gradient(135deg,#7c3aed,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header a{color:#888;text-decoration:none;font-size:.8rem}
.page{max-width:600px;margin:0 auto;padding:24px}
.card{background:rgba(17,17,17,.9);border-radius:14px;padding:24px;border:1px solid rgba(124,58,237,.2)}
.card h2{font-size:1rem;margin-bottom:16px;color:#7c3aed;display:flex;align-items:center;gap:8px}
.label{font-size:.75rem;color:#888;display:block;margin-bottom:4px;margin-top:14px}
.label:first-of-type{margin-top:0}
.label span{color:#ef4444}
.input{width:100%;padding:10px 12px;border:1px solid #333;border-radius:8px;background:rgba(26,26,46,.8);color:#e0e0e0;font-size:.85rem;transition:border .2s;box-sizing:border-box}
.input:focus{outline:none;border-color:#7c3aed}
.input[readonly]{color:#888;border-color:#222}
textarea.input{resize:vertical;font-size:.78rem}
select.input{appearance:auto;cursor:pointer}
.hint{color:#666;font-size:.68rem;margin-top:2px}
.row2{display:flex;gap:12px;margin-top:16px}
.row2>*{flex:1}
.btn{padding:11px 22px;border:none;border-radius:8px;font-size:.82rem;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .2s;width:100%;justify-content:center}
.btn-start{background:linear-gradient(135deg,#22c55e,#16a34a);color:#000;padding:14px;font-size:.9rem}
.btn-start:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(34,197,94,.3)}
.btn-ghost{background:rgba(255,255,255,.06);color:#ccc;border:1px solid #333}
.btn-ghost:hover{background:rgba(255,255,255,.1)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.status-box{margin-top:14px;padding:12px;border-radius:8px;font-size:.82rem}
.status-ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#22c55e}
.status-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.1);border-top-color:#22c55e;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.back-link{display:inline-block;margin-bottom:16px;color:#7c3aed;text-decoration:none;font-size:.82rem}
.back-link:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class=header>
    <h1>TikTok Live Panel</h1>
    <a href="/dashboard">← Back to Dashboard</a>
  </div>

  <div class=page>
    <a href="/dashboard" class=back-link>← Back to Dashboard</a>
    <div class=card>
      <h2>🐙 Go Live — GitHub Actions</h2>
      <p style="color:#888;font-size:.8rem;margin-bottom:16px">All fields are pre-filled from your setup. Edit before pushing.</p>

      <form id=liveForm>
        <label>RTMP URL (auto-filled from TikTok)</label>
        <input class=input id=rtmpUrl readonly>

        <label>Stream Key (auto-filled from TikTok)</label>
        <input class=input id=streamKey readonly>

        <label>Source URL <span>*</span></label>
        <input class=input id=sourceUrl value="{{ stream.source_url or '' }}" placeholder="https://youtube.com/watch?v=... or https://twitch.tv/...">
        <div class=hint>YouTube, Twitch, or direct HLS .m3u8 URL</div>

        <label>GitHub Personal Access Token <span>*</span></label>
        <input class=input id=githubPat type=password value="{{ stream.github_pat or '' }}" placeholder="ghp_xxxxxxxxxxxx">
        <div class=hint>Required to trigger workflow. Saved for future use.</div>

        <label>YouTube Cookies (base64, optional)</label>
        <textarea class=input id=cookiesB64 rows=3 placeholder="Base64-encoded cookies.txt for age-restricted videos">{{ stream.cookies_b64 or '' }}</textarea>

        <label>Preview Mode</label>
        <select class=input id=previewMode>
          <option value=false {% if stream.preview != 'true' %}selected{% endif %}>Stream live</option>
          <option value=true {% if stream.preview == 'true' %}selected{% endif %}>Preview only (no streaming)</option>
        </select>

        <div class=row2>
          <button type=button class="btn btn-ghost" onclick="saveOnly()">💾 Save Only</button>
          <button type=button class="btn btn-start" id=goLiveBtn onclick="goLive()">🚀 Push to Stream</button>
        </div>
      </form>

      <div id=statusBox style="display:none"></div>
    </div>
  </div>

<script>
var keyData=null;
var $=function(s){return document.querySelector(s)};

function getKey(){
  return fetch('/api/room/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({})}).then(function(r){return r.json()}).then(function(d){
    if(d.ok){keyData=d;$('#rtmpUrl').value=d.rtmp_url;$('#streamKey').value=d.stream_key}
    return d;
  });
}

function saveOnly(){
  var data={source_url:$('#sourceUrl').value,github_pat:$('#githubPat').value,cookies_b64:$('#cookiesB64').value,preview:$('#previewMode').value};
  fetch('/api/stream/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).then(function(r){return r.json()}).then(function(d){
    if(d.ok){showStatus('Saved!','ok')}else{showStatus(d.error,'err')}
  });
}

function goLive(){
  var btn=$('#goLiveBtn');
  var src=$('#sourceUrl').value.trim();
  var pat=$('#githubPat').value.trim();
  if(!src){showStatus('Enter a source URL','err');return}
  if(!pat){showStatus('Enter GitHub PAT','err');return}

  btn.disabled=true;
  btn.innerHTML='<span class=spinner></span> Getting key & triggering...';

  getKey().then(function(d){
    if(!d.ok){showStatus('Failed to get key: '+d.error,'err');btn.disabled=false;btn.innerHTML='🚀 Push to Stream';return}
    saveSettings().then(function(){
      var body={stream_key:keyData.stream_key,rtmp_url:keyData.rtmp_url,source_url:src,github_pat:pat,cookies_b64:$('#cookiesB64').value,preview:$('#previewMode').value};
      return fetch('/api/golive',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    }).then(function(r){return r.json()}).then(function(d){
      if(d.ok){
        showStatus('Workflow triggered! <a href="https://github.com/zidanebarkat/8dca7ff25e47b8cc0e104b9f-tt/actions" target="_blank" style="color:#60a5fa">View runs</a>','ok');
      }else{
        showStatus(d.error,'err');
      }
      btn.disabled=false;btn.innerHTML='🚀 Push to Stream';
    }).catch(function(e){
      showStatus(e.message,'err');
      btn.disabled=false;btn.innerHTML='🚀 Push to Stream';
    });
  });
}

function saveSettings(){
  var data={source_url:$('#sourceUrl').value,github_pat:$('#githubPat').value,cookies_b64:$('#cookiesB64').value,preview:$('#previewMode').value};
  return fetch('/api/stream/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).then(function(r){return r.json()});
}

function showStatus(msg,type){
  var box=$('#statusBox');
  box.style.display='';
  box.className='status-box status-'+type;
  box.innerHTML=msg;
}

getKey();
</script>
</body>
</html>
