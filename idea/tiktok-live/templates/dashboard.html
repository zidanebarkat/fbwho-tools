<!DOCTYPE html>
<html>
<head>
  <meta name=viewport content="width=device-width,initial-scale=1">
  <title>TikTok Live Studio Panel</title>
  <style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#0a0a0a,#1a0a2e);color:#e0e0e0;font-family:system-ui;min-height:100vh}
.header{background:rgba(17,17,17,.95);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #222;backdrop-filter:blur(10px);position:sticky;top:0;z-index:100}
.header h1{font-size:1.15rem;background:linear-gradient(135deg,#7c3aed,#22c55e);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header a{color:#888;text-decoration:none;font-size:.8rem}
.mainer{display:flex;gap:24px;padding:24px;max-width:1400px;margin:0 auto}
.col{flex:1;min-width:0}
.section{background:rgba(17,17,17,.9);border-radius:14px;padding:22px;margin-bottom:20px;border:1px solid rgba(124,58,237,.2)}
.section h2{font-size:1rem;margin-bottom:16px;color:#7c3aed;display:flex;align-items:center;gap:8px}
label{font-size:.75rem;color:#888;display:block;margin-bottom:4px;margin-top:12px}
input,select{width:100%;padding:10px 12px;border:1px solid #333;border-radius:8px;background:rgba(26,26,46,.8);color:#e0e0e0;font-size:.85rem;transition:border .2s}
input:focus,select:focus{outline:none;border-color:#7c3aed}
select{appearance:auto;cursor:pointer}
.trow{display:flex;flex-wrap:wrap;gap:10px;margin-top:14px}
.titem{display:flex;align-items:center;gap:6px;background:rgba(26,26,46,.6);padding:7px 12px;border-radius:8px;border:1px solid #333}
.titem input[type=checkbox]{width:16px;height:16px;accent-color:#7c3aed;cursor:pointer}
.titem label{font-size:.75rem;margin:0;cursor:pointer;color:#ccc}
.btn{padding:11px 22px;border:none;border-radius:8px;font-size:.82rem;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff}.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(124,58,237,.3)}
.btn-start{background:linear-gradient(135deg,#22c55e,#16a34a);color:#000}.btn-start:hover{transform:translateY(-1px);box-shadow:0 4px 15px rgba(34,197,94,.3)}
.btn-stop{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}.btn-stop:hover{transform:translateY(-1px)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-full{width:100%;justify-content:center;margin-top:16px}
.btn-sm{font-size:.74rem;padding:5px 12px}
.btn-ghost{background:rgba(255,255,255,.06);color:#ccc;border:1px solid #333}
.btn-ghost:hover{background:rgba(255,255,255,.1)}
.rbox{background:rgba(26,26,46,.6);border:1px solid #333;border-radius:10px;padding:16px;margin-top:10px;word-break:break-all;font-size:.82rem}
.rbox .lbl{color:#888;font-size:.7rem;margin-top:8px}
.rbox .lbl:first-of-type{margin-top:0}
.rbox .val{color:#22c55e;font-weight:500;font-family:monospace}
.rbox .url{color:#60a5fa}
.logbox{background:#0d0d0d;border-radius:8px;padding:12px;max-height:280px;overflow-y:auto;font-family:monospace;font-size:.72rem;line-height:1.6}
.logbox div{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.loginfo{color:#888}.logok{color:#22c55e}.logerr{color:#ef4444}.logwarn{color:#f59e0b}
.status{padding:10px 14px;border-radius:8px;font-size:.8rem;margin-top:10px}
.status-ok{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#22c55e}
.status-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.1);border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}
.row2{display:flex;gap:12px}
.row2>*{flex:1}
.mt10{margin-top:10px}
.auth-tabs{display:flex;gap:4px;margin-bottom:16px;background:rgba(26,26,46,.6);border-radius:10px;padding:4px}
.auth-tab{padding:8px 16px;border-radius:8px;font-size:.78rem;cursor:pointer;border:none;background:transparent;color:#888;transition:all .2s}
.auth-tab.active{background:#7c3aed;color:#fff}
.auth-panel{display:none}
.auth-panel.active{display:block}
  </style>
</head>
<body>
  <div class=header>
    <h1>TikTok Live Studio Panel</h1>
    <a href="/logout">Logout</a>
  </div>

  <div class=mainer>
    <div class=col>
      <!-- Auth -->
      <div class=section>
        <h2>🔑 Authenticate</h2>
        <div class=auth-tabs>
          <button class="auth-tab active" onclick="showAuth('qr')">QR Scan</button>
          <button class="auth-tab" onclick="showAuth('web')">Web Login</button>
          <button class="auth-tab" onclick="showAuth('session')">Session ID</button>
          <button class="auth-tab" onclick="showAuth('cookie')">Cookie File</button>
        </div>

        <div id=authQR class="auth-panel active">
          <p style="color:#888;font-size:.78rem;margin-bottom:10px">Scan with TikTok app</p>
          <div id=qrcontainer style="text-align:center;min-height:180px;display:flex;align-items:center;justify-content:center">
            <span id=qrstatus style="color:#888">Loading QR code...</span>
          </div>
          <button class="btn btn-primary btn-full" onclick="qrStatus()">Check QR Status</button>
        </div>

        <div id=authWeb class="auth-panel">
          <p style="color:#888;font-size:.78rem;margin-bottom:10px">Open in browser</p>
          <button class="btn btn-primary btn-full" onclick="webLogin()">Open Login Page</button>
          <div class=mt10>
            <label>Login token</label>
            <input id=wt style=width:100% placeholder="Paste redirected token...">
            <button class="btn btn-primary btn-full" onclick="completeWebLogin()">Complete Login</button>
          </div>
        </div>

        <div id=authSession class="auth-panel">
          <label>Session ID (paste cookies)</label>
          <textarea id=ct rows=4 style="width:100%;resize:vertical;font-size:.78rem" placeholder='sessionid=xxx; sessionid_ss=yyy; ...'></textarea>
          <button class="btn btn-primary btn-full" onclick="setCookies()">Set Cookies</button>
        </div>

        <div id=authCookie class="auth-panel">
          <label>Upload cookie JSON file</label>
          <input type=file id=cf accept=.json>
          <button class="btn btn-primary btn-full" onclick="uploadCookies()">Upload</button>
        </div>
      </div>

      <!-- Stream Settings -->
      <div class=section>
        <h2>⚙️ Stream Settings</h2>
        <label>Title</label>
        <input id=ft value="My Live Stream">
        <label>Game</label>
        <select id=fg><option value="">Loading...</option></select>
        <label>Topic</label>
        <select id=fto><option value="">Select game first</option></select>
        <div class=trow id=etr></div>
        <button class="btn btn-primary btn-full" onclick="startStream()">🚀 Start Stream</button>
        <button class="btn btn-ghost btn-full" onclick="refreshGameTags()" style=margin-top:8px>🔄 Refresh Games</button>
      </div>
    </div>

    <div class=col>
      <!-- Room Info -->
      <div class=section id=ri style=display:none>
        <h2>📡 Room Info</h2>
        <div class=rbox id=sr></div>
        <button class="btn btn-sm btn-ghost" onclick="ca()">📋 Copy All</button>
        <button class="btn btn-sm btn-stop" onclick="es()">⏹ End Stream</button>
        <button class="btn btn-sm btn-start" onclick="start24h()">🔄 24h Push</button>
        <div id=stream24hStatus style=margin-top:8px></div>
      </div>

      <!-- Subtitle / Extra -->
      <div class=section>
        <h2>📝 Subtitle</h2>
        <label>Subtitle URL (SRT/ASS)</label>
        <input id=st placeholder="https://...">
        <div class=row2>
          <div><label>Language</label><input id=sl value="en"></div>
          <div><label>Format</label><select id=sf><option value=srt>SRT</option><option value=ass>ASS</option></select></div>
        </div>
        <button class="btn btn-primary btn-full" onclick="applySubtitle()">Apply Subtitle</button>
      </div>

      <!-- Stream Status -->
      <div class=section>
        <h2>📊 Stream Status</h2>
        <div id=ss><button class="btn btn-sm btn-ghost" onclick="cs()">Check Status</button></div>
      </div>

      <!-- Log -->
      <div class=section>
        <h2>📋 Log</h2>
        <div class=logbox id=lb>
          <div class=loginfo>Ready</div>
        </div>
      </div>
    </div>
  </div>

<script>
const $=(s)=>document.querySelector(s);
const el=(t,a)=>Object.assign(document.createElement(t),a);
const lg=(m,t='info')=>{let d=el('div',{className:'log'+t,textContent:'['+new Date().toLocaleTimeString()+'] '+m});let lb=$('#lb');lb.appendChild(d);lb.scrollTop=lb.scrollHeight;if(lb.children.length>200)lb.removeChild(lb.firstChild)};

function showAuth(t){document.querySelectorAll('.auth-panel,.auth-tab').forEach(e=>e.classList.remove('active'));document.getElementById('auth'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');document.querySelectorAll('.auth-tab').forEach(e=>{if(e.textContent.toLowerCase().includes(t))e.classList.add('active')})}

function qrStatus(){fetch('/api/qr/poll',{method:'POST'}).then(r=>r.json()).then(d=>{if(d.qr){$('#qrcontainer').innerHTML='<img src=\''+d.qr+'\' style=width:200px;border-radius:8px>';$('#qrstatus').textContent='Scan with TikTok app'}else if(d.ok){lg('Login OK','ok');location.reload()}else{lg('Not scanned yet','warn')}}).catch(e=>lg(e.message,'err'))}
function qrPoll(){fetch('/api/qr/poll',{method:'POST'}).then(r=>r.json()).then(d=>{if(d.qr){$('#qrcontainer').innerHTML='<img src=\''+d.qr+'\' style=width:200px;border-radius:8px>';$('#qrstatus').textContent='Scan with TikTok app';setTimeout(qrPoll,3000)}else if(d.ok){lg('Login OK','ok');location.reload()}else{lg('QR expired','warn');setTimeout(qrPoll,5000)}}).catch(e=>{lg(e.message,'err');setTimeout(qrPoll,5000)})}
setTimeout(qrPoll,500);

function webLogin(){fetch('/api/weblogin/start',{method:'POST'}).then(r=>r.json()).then(d=>{if(d.url){window.open(d.url,'_blank');lg('Login page opened','info')}else{lg('Failed to get login URL','err')}}).catch(e=>lg(e.message,'err'))}
function completeWebLogin(){let t=$('#wt').value.trim();if(!t)return;fetch('/api/weblogin/complete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:t})}).then(r=>r.json()).then(d=>{if(d.ok){lg('Login OK','ok');location.reload()}else{lg('Login failed: '+d.error,'err')}}).catch(e=>lg(e.message,'err'))}

function setCookies(){let t=$('#ct').value.trim();if(!t)return;fetch('/api/cookies',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cookies:t})}).then(r=>r.json()).then(d=>{if(d.ok){lg('Cookies set','ok');location.reload()}else{lg('Failed: '+d.error,'err')}}).catch(e=>lg(e.message,'err'))}

function uploadCookies(){let f=$('#cf').files[0];if(!f)return;let r=new FileReader();r.onload=function(){fetch('/api/cookies',{method:'POST',headers:{'Content-Type':'application/json'},body:r.result}).then(r=>r.json()).then(d=>{if(d.ok){lg('Cookies loaded','ok');location.reload()}else{lg('Failed: '+d.error,'err')}}).catch(e=>lg(e.message,'err'))};r.readAsText(f)}

function refreshGameTags(){fetch('/api/games').then(r=>r.json()).then(d=>{let s=$('#fg'),t=$('#fto');if(!d.games){lg('Failed to load games','err');return}
s.innerHTML='<option value="">Select game</option>'+d.games.map(g=>'<option value="'+g.id+'">'+g.name+'</option>').join('');let ec=$('#etr');ec.innerHTML='';if(d.extras&&d.extras.length){d.extras.forEach(e=>{let c=el('div',{className:'titem'});let cb=el('input',{type:'checkbox',value:e.id,id:'tg_'+e.id});let lb=el('label',{textContent:e.name,htmlFor:'tg_'+e.id});c.append(cb,lb);ec.appendChild(c)})}
if(d.topics&&d.topics.length){t.innerHTML='<option value="">Select topic</option>'+d.topics.map(t=>'<option value="'+t.id+'">'+t.name+'</option>').join('')}else{t.innerHTML='<option value="">No topics</option>'}
lg('Games loaded: '+d.games.length,'ok')}).catch(e=>lg('Error: '+e.message,'err'))}
setTimeout(refreshGameTags,1000);

function startStream(){let t=$('#ft').value.trim()||'My Live Stream',g=$('#fg').value,tp=$('#fto').value;let ex=[];$('#etr').querySelectorAll('input[type=checkbox]:checked').forEach(c=>ex.push(c.value));if(!g){lg('Select a game','warn');return}
lg('Starting stream...','info');$('#ri').style.display='none';fetch('/api/room/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:t,game_id:g,topic_id:tp,extra_tags:ex})}).then(r=>r.json()).then(d=>{if(d.ok){let h='<div class=lbl>Server URL</div><div class=val url>'+d.server_url+'</div><div class=lbl>Stream Key</div><div class=val>'+d.stream_key+'</div><div class=lbl>RTMP URL</div><div class=val>'+d.rtmp_url+'</div><div class=lbl>Share URL</div><div class=val>'+d.share_url+'</div><div class=lbl>Room ID: '+d.room_id+'</div>';$('#sr').innerHTML=h;$('#ri').style.display='';$('#ri').scrollIntoView({behavior:'smooth'})}else{lg('Failed: '+d.error,'err')}}).catch(e=>{lg('Error: '+e,'err')})}

function es(){let rid=prompt('Room ID:'),sid=prompt('Stream ID (optional):');if(!rid)return;lg('Ending stream...','info');fetch('/api/room/end',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({room_id:rid,stream_id:sid})}).then(r=>r.json()).then(d=>{lg(d.ok?'Stream ended':'Failed: '+d.error,d.ok?'ok':'err')}).catch(e=>{lg('Error: '+e,'err')})}

function ca(){let t=$('#sr').innerText;navigator.clipboard.writeText(t);lg('Copied','ok')}

function start24h(){let sr=$('#sr'),el=sr.querySelectorAll('.val');let rtmp=el[2]?el[2].textContent:'',key=el[1]?el[1].textContent:'',share=el[3]?el[3].textContent:'',room=sr.innerText.match(/Room ID: (\S+)/);lg('Starting 24h stream...','info');fetch('/api/24h/push',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({server_url:el[0]?el[0].textContent:'',stream_key:key,rtmp_url:rtmp,share_url:share,room_id:room?room[1]:'',title:document.getElementById('ft').value||'Live Stream'})}).then(r=>r.json()).then(d=>{if(d.ok){lg('24h stream started!','ok');document.getElementById('stream24hStatus').innerHTML='<span style=color:#22c55e>Stream pushed. Auto-restart every 6h.</span>'}else{lg('Error: '+d.error,'err');document.getElementById('stream24hStatus').innerHTML='<span style=color:#ef4444>'+d.error+'</span>'}}).catch(e=>{lg('Error: '+e,'err')})}

function cs(){fetch('/api/status').then(r=>r.json()).then(d=>{let h='<div class=lbl>Status</div><div class=val>'+d.status+'</div>';if(d.viewers!==undefined)h+='<div class=lbl>Viewers</div><div class=val>'+d.viewers+'</div>';$('#ss').innerHTML=h;lg('Status: '+d.status,'ok')}).catch(e=>lg('Error: '+e,'err'))}
</script>
</body>
</html>
